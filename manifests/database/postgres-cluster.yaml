apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tattoo-db
  namespace: database
spec:
  # Portfolio: 1 instância para reduzir custo (~$60/mês por nó on-demand t3.medium).
  # Em produção com carga real, aumentar para 3 (1 primary + 2 hot standby) ou migrar
  # para RDS Multi-AZ — replicação async + sync standby sem operação manual, ideal para
  # times sem SRE dedicado. CNPG exige você mesmo gerenciar failover, monitoramento e
  # atualizações do operator; RDS abstrai tudo isso com SLA de 99.95%.
  instances: 1

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: tattoo
      owner: tattoo_user
      secret:
        name: tattoo-db-credentials

  storage:
    size: 20Gi      # gp3 suporta resize online — edite e aplique sem downtime
    storageClass: gp3

  # Fixado em nós on-demand — perder o primário num Spot causa failover desnecessário
  # e dois Spots indo embora ao mesmo tempo pode causar split-brain
  affinity:
    tolerations:
      - key: workload
        operator: Equal
        value: ondemand
        effect: NoSchedule
    nodeSelector:
      capacity-type: ondemand

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      # Bucket criado pelo Terraform — terraform output s3_backup_bucket
      destinationPath: s3://projetin-cnpg-backup/tattoo-db
      s3Credentials:
        inheritFromIAMRole: true
